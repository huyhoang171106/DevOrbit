spring:
  application:
    name: devorbit-api
  sql:
    init:
      mode: always
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/devorbit_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:huyhoang}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}
server:
  port: ${SERVER_PORT:8080}

