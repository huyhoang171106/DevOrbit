spring:
  application:
    name: devorbit-api
  
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/devorbit_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:huyhoang}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}

app:
  github:
    token: ${GITHUB_TOKEN:}
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://104.214.179.110,http://104.214.179.110:5173,https://provide-significance-consumer-guys.trycloudflare.com}

server:
  port: ${SERVER_PORT:8080}

supabase:
  url: ${SUPABASE_URL:}
  key: ${SUPABASE_KEY:}
  bucket: ${SUPABASE_BUCKET:devorbit}
