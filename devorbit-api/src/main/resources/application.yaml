spring:
  application:
    name: devorbit-api
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/devorbit_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:huyhoang}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}
app:
  github:
    token: ${GITHUB_TOKEN:}
  jwt:
    secret: ${JWT_SECRET:default-jwt-secret-key-long-enough-256bits}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
server:
  port: ${SERVER_PORT:8080}

