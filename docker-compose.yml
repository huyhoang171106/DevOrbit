version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: devorbit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devorbit_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devorbit_local_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./devorbit-api
      dockerfile: Dockerfile
    container_name: devorbit-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-devorbit_db}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-devorbit_local_password}
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "false"
      JPA_FORMAT_SQL: "false"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      JWT_SECRET: ${JWT_SECRET:-default-jwt-secret-key-long-enough-256bits}
      JWT_EXPIRATION_MINUTES: "120"
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"

  web:
    build:
      context: ./devorbit-web
      dockerfile: Dockerfile
    container_name: devorbit-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "3000:80"

volumes:
  pgdata:
